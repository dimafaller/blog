title: Записки старого ворчнуа
name: Dima Faller
user_description: Salesman with the highes KPI on earth
notes_url: "dimafaller.ru"
profile_pic: /assets/img/profile.png
favicon: /assets/img/favicon.png
copyright_name: Dima Faller
baseurl: "/" # the subpath of your site, e.g. /blog
url: "https://dimafaller.ru" # the base hostname & protocol for your site, e.g. http://example.com
encoding: utf-8

# Build settings
theme: null
plugins:
  - jekyll-feed
  - jekyll-sitemap

markdown: kramdown

kramdown:
  input: GFM
  hard_wrap: false
  math_engine: mathjax
  smart_quotes: ["apos", "apos", "quot", "quot"]
  syntax_highlighter: rouge

sass:
  style: compressed

collections:
    notes:
      output: true
      permalink: /notes/:title

disqus:
  shortname: dimafaller

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      permalink: /posts/:title
      content-type: post
  - scope:
      path: ""
      type: notes
    values:
      layout: post
      content-type: notes
